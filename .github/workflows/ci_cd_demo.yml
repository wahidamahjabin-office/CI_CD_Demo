name: CI/CD Pipeline

# ── TRIGGER: When does this pipeline run? ────────────────────────────────────
on:
  push:
    branches: [ main, dev ]      # Run on every push to main or dev
  pull_request:
    branches: [ main ]           # Run on every Pull Request targeting main

# ── JOBS ─────────────────────────────────────────────────────────────────────
jobs:

  # ── JOB 1: Run Tests (CI) ──────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest       # GitHub spins up a fresh Ubuntu VM

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      # Step 4: Run the tests
      - name: Run tests with pytest
        run: pytest tests/ -v

  # ── JOB 2: Lint Check (CI) ────────────────────────────────────────────────
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    needs: test                  # Only lint if tests pass first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 linter
        run: flake8 src/ --max-line-length=100

  # ── JOB 3: Simulated Deploy (CD) ─────────────────────────────────────────
  deploy:
    name: Deploy (Simulated)
    runs-on: ubuntu-latest
    needs: [test, lint]          # Only deploy if BOTH test and lint pass
    if: github.ref == 'refs/heads/main'  # Only deploy from main branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate deployment
        run: |
          echo "✅ All checks passed!"
          echo "🚀 Deploying to production server..."
          echo "📦 Build artifact: calculator-app-v1.0"
          echo "🌍 App is now LIVE!"
